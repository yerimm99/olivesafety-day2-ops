apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: olivesafety-api
  namespace: olivesafety
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: olivesafety-api
  namespaceSelector:
    matchNames:
      - olivesafety
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
      scrapeTimeout: 10s
