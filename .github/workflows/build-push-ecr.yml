name: Build and Push API Image

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/build-push-ecr.yml"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: olivesafety-day2-ops-dev/olivesafety-api
  KUSTOMIZATION_PATH: k8s/overlays/dev/kustomization.yaml

jobs:
  build-and-push:
    name: Build and push Docker image to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: vars
        run: |
          IMAGE_TAG=$(git rev-parse --short HEAD)
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image uri
        id: image
        run: |
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.image_uri }}:${{ steps.vars.outputs.image_tag }}

      - name: Update Kubernetes image tag
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os

          path = Path(os.environ["KUSTOMIZATION_PATH"])
          image_uri = os.environ["IMAGE_URI"]
          image_tag = os.environ["IMAGE_TAG"]

          text = path.read_text()
          lines = text.splitlines()

          out = []
          in_images = False
          target_image = False

          for line in lines:
              stripped = line.strip()

              if stripped == "images:":
                  in_images = True
                  out.append(line)
                  continue

              if in_images and stripped.startswith("- name:"):
                  target_image = stripped == "- name: olivesafety-api"
                  out.append(line)
                  continue

              if in_images and target_image and stripped.startswith("newName:"):
                  indent = line[:len(line) - len(line.lstrip())]
                  out.append(f"{indent}newName: {image_uri}")
                  continue

              if in_images and target_image and stripped.startswith("newTag:"):
                  indent = line[:len(line) - len(line.lstrip())]
                  out.append(f"{indent}newTag: {image_tag}")
                  target_image = False
                  continue

              out.append(line)

          path.write_text("\n".join(out) + "\n")
          PY

          echo "Updated ${KUSTOMIZATION_PATH}:"
          grep -A3 "name: olivesafety-api" "${KUSTOMIZATION_PATH}"

      - name: Commit Kubernetes image tag
        run: |
          if git diff --quiet "${KUSTOMIZATION_PATH}"; then
            echo "No image tag change to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${KUSTOMIZATION_PATH}"
          git commit -m "chore: update API image tag to ${IMAGE_TAG}"
          git push
