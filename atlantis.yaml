version: 3

projects:
  - name: dev
    dir: terraform/envs/dev
    workspace: default
    workflow: dev
    autoplan:
      when_modified:
        - "*.tf"
        - "*.tfvars"
        - "../../modules/**/*.tf"
      enabled: true
    apply_requirements:
      - approved
      - mergeable

workflows:
  dev:
    plan:
      steps:
        - init
        - plan:
            extra_args:
              - -var-file=/opt/atlantis/tfvars/dev.tfvars
              - -var-file=/opt/atlantis/tfvars/alerting.tfvars
    apply:
      steps:
        - apply
