---
- name: Deploy ops-check scripts to Bastion
  hosts: ops
  gather_facts: false

  vars:
    ops_base_dir: "/opt/olivesafety"
    ops_check_dir: "/opt/olivesafety/ops-check"
    report_dir: "/opt/olivesafety/reports"

  tasks:
    - name: Create ops base directory
      become: true
      ansible.builtin.file:
        path: "{{ ops_base_dir }}"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: "0755"

    - name: Create ops-check directory
      become: true
      ansible.builtin.file:
        path: "{{ ops_check_dir }}"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: "0755"

    - name: Create report directory
      become: true
      ansible.builtin.file:
        path: "{{ report_dir }}"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: "0755"

    - name: Copy ops-check scripts
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "{{ ops_check_dir }}/{{ item | basename }}"
        owner: ec2-user
        group: ec2-user
        mode: "0755"
      loop: "{{ lookup('ansible.builtin.fileglob', playbook_dir + '/../../ops-check/*.sh', wantlist=True) }}"
